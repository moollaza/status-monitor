name: Deploy Website to GitHub Pages

on:
  push:
    branches: ["main"]
    # Also redeploy when the catalog changes — the site embeds
    # Resources/catalog.json at build time (copied via the step below),
    # so catalog-only changes must rebuild the site too. Without this,
    # adding services to the catalog silently fails to reach users
    # browsing the public site.
    paths:
      - "website/**"
      - "Resources/catalog.json"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - name: Bundle catalog for site
        run: cp Resources/catalog.json website/catalog.json
      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: website
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
