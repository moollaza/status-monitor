name: Deploy Website to Cloudflare Pages

on:
  push:
    branches: ["main"]
    # The site embeds Resources/catalog.json at deploy time, so
    # catalog-only changes must redeploy the public website too.
    paths:
      - "website/**"
      - "Resources/catalog.json"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: "cloudflare-pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: cloudflare-pages
      url: https://usenazar.com/
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Bundle catalog for site
        run: cp Resources/catalog.json website/catalog.json

      - name: Deploy to Cloudflare Pages
        timeout-minutes: 5
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4.71.0 pages deploy website --project-name=usenazar --branch=main --commit-dirty
