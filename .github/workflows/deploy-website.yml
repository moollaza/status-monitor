name: Deploy Website to Cloudflare Pages

on:
  push:
    branches: ["main"]
    # The site embeds Resources/catalog.json at deploy time, so
    # catalog-only changes must redeploy the public website too.
    paths:
      - "website/**"
      - "Resources/catalog.json"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: "cloudflare-pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: cloudflare-pages
      url: https://usenazar.com/
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Bundle catalog for site
        run: cp Resources/catalog.json website/catalog.json

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: 4.71.0
          command: pages deploy website --project-name=usenazar --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
