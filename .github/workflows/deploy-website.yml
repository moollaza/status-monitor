name: Deploy Website to GitHub Pages

on:
  push:
    branches: ["main"]
    # Also redeploy when the catalog changes — the site embeds
    # Resources/catalog.json at build time (copied via the step below),
    # so catalog-only changes must rebuild the site too. Without this,
    # adding services to the catalog silently fails to reach users
    # browsing the public site.
    paths:
      - "website/**"
      - "Resources/catalog.json"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Bundle catalog for site
        run: cp Resources/catalog.json website/catalog.json
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
